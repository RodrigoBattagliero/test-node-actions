<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f5f5f5;
    }
    h1 { color: #333; }
    button {
      padding: 0.5rem 1rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }
    #output {
      margin-top: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>Pagina de prueba</h1>
  <p>Todo funciona correctamente.</p>
  <button onclick="saludar()">Haz clic</button>
  <div id="output"></div>

  <script>
    function saludar() {
      const output = document.getElementById('output');
      output.textContent = 'Hola desde JavaScript! ' + new Date().toLocaleTimeString();
    }
  </script>
</body>
</html>
